name: Build Punch APK

# Builds the debug APK in the cloud, sidestepping the local Windows AF_UNIX/Gradle issue.
# The native android/ project already has the web assets bundled in (via `npx cap sync`),
# so CI only needs a JDK + Android SDK + Gradle — no Node/Capacitor step required.

on:
  push:
    branches: [main, master]
  workflow_dispatch: # lets you trigger a build manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Capacitor's android/capacitor.settings.gradle references the Capacitor library at
      # ../node_modules/@capacitor/android/capacitor, so node_modules must exist before Gradle
      # runs. node_modules is gitignored, so restore it here deterministically from the lockfile.
      - name: Restore node_modules
        run: npm ci

      # Capacitor's own android/.gitignore excludes several generated-but-required pieces:
      # capacitor-cordova-android-plugins/, the copied web assets (app/src/main/assets/public),
      # and the generated capacitor.config.json / capacitor.plugins.json. `cap sync` regenerates
      # all of them from the committed www/ build, so the native project is complete for Gradle.
      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: punch-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
